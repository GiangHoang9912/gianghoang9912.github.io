name: Build CV

on:
  push:
    paths:
      - release.md

concurrency:
  group: cv-build
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc & texlive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc texlive-xetex texlive-latex-recommended texlive-latex-extra

      - name: Build HTML
        run: |
          pandoc release.md \
            -o release.html \
            --standalone \
            --metadata title="Nguyen Hoang Giang — CV" \
            --css=https://cdn.jsdelivr.net/npm/water.css@2/out/water.css

      - name: Build PDF
        run: |
          pandoc release.md \
            -o release.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V mainfont="DejaVu Sans" \
            -V monofont="DejaVu Sans Mono"

      - name: Build DOCX
        run: pandoc release.md -o release.docx

      - name: Commit HTML & PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.html release.pdf
          git diff --staged --quiet || git commit -m "Build CV from release.md"
          git push

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV-DOCX
          path: release.docx
          if-no-files-found: warn
